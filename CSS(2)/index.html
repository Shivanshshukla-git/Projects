<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="shivansh-shukla">
    <meta name="description" content="Building a simple project using mobile first approach">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Our staff</h1>
        <nav>
            <ul>
                <li><a href="#profile1">Joe</a></li>
                <li><a href="#profile2">Matt</a></li>
                <li><a href="#profile3">Jane</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="profile1" class="box">
            <div>
                <figure>
                    <img src="profile1.png" alt="A pic of Joe" width="500" height="500" >
                    <figcaption>Joe coder</figcaption>
                </figure>
                <p>"I code stuff."</p>       
            </div>
        </section>
        <section id="profile2" class="box">    
            <div>
                <figure>
                    <img src="profile2.png" alt="A pic of matt" width="500" height="500" >
                    <figcaption>Matt Designer</figcaption>
                </figure>
                <p>"I design stuff."</p>
            </div>
        </section>
        <section id="profile3" class="box">
            <div>
                <figure>
                    <img src="profile3.png" alt="A pic of jane" width="500" height="500" >
                    <figcaption>Jane <span class="nowrap">Dev Rel</span></figcaption>
                </figure>
                <p>"I teach stuff."</p>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy;Acme Co.</p>
    </footer>
</body>
</html>
